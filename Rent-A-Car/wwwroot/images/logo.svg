<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="220" height="220" viewBox="0 0 220 220" role="img" aria-label="RentCAR logo">
  <defs>
    <linearGradient id="g1" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0ea5c9"/>
    </linearGradient>
  </defs>
  <!-- Simple stylized car front -->
  <g transform="translate(10,30)">
    <rect x="0" y="40" width="160" height="50" rx="10" fill="#374151" />
    <rect x="10" y="20" width="80" height="40" rx="6" fill="#374151" />
    <!-- headlight -->
    <circle cx="130" cy="65" r="6" fill="#9ca3af" />
  </g>
  <!-- location pin on the right -->
  <g transform="translate(130,10)">
    <path d="M30 0C14.3 0 2 12.3 2 28c0 15.7 28 54 28 54s28-38.3 28-54C58 12.3 45.7 0 30 0z" fill="url(#g1)"/>
    <circle cx="30" cy="28" r="10" fill="#ffffff"/>
  </g>
  <!-- Brand text -->
  <g transform="translate(10,130)">
    <text x="0" y="30" font-family="Segoe UI, Roboto, Arial" font-size="28" font-weight="700" fill="#06A0DA">Rent</text>
    <text x="70" y="30" font-family="Segoe UI, Roboto, Arial" font-size="28" font-weight="700" fill="#374151">CAR</text>
  </g>
</svg>
